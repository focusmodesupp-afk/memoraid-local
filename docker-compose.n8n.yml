version: '3.8'

# N8N workflow automation for MEMORAID NEXUS research pipeline.
# Usage: docker compose -f docker-compose.n8n.yml up -d
# Access N8N at: http://localhost:5678
# Webhook URL base: http://localhost:5678/webhook

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: memoraid-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=memoraid
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Jerusalem
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
